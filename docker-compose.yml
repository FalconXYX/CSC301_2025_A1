version: "3.8"

services:
  nginx-lb:
    image: nginx:alpine
    container_name: csc301_api_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
      - order-service

  postgres:
    image: postgres:16-alpine
    container_name: csc301_postgres
    command: postgres -c max_connections=1000 -c shared_buffers=256MB -c synchronous_commit=off -c fsync=off
    environment:
      POSTGRES_USER: csc301
      POSTGRES_PASSWORD: csc301password
      POSTGRES_DB: csc301_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csc301"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ./UserService
    volumes:
      - ./docker-config.json:/app/config.json:ro
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m -XX:+UseG1GC
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST:-postgres}:${DB_PORT:-5432}/csc301_db
    deploy:
      replicas: 5
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build:
      context: ./ProductService
    volumes:
      - ./docker-config.json:/app/config.json:ro
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m -XX:+UseG1GC
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST:-postgres}:${DB_PORT:-5432}/csc301_db
    deploy:
      replicas: 5
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build:
      context: ./OrderService
    volumes:
      - ./docker-config.json:/app/config.json:ro
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx512m -XX:+UseG1GC
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST:-postgres}:${DB_PORT:-5432}/csc301_db
    deploy:
      replicas: 5
    depends_on:
      postgres:
        condition: service_healthy

  iscs:
    build:
      context: ./ISCS
    volumes:
      - ./docker-config.json:/app/config.json:ro
    environment:
      - ISCS_LISTEN_IP=0.0.0.0
      - USER_SERVICE_IP=user-service
      - USER_SERVICE_PORT=14001
      - PRODUCT_SERVICE_IP=product-service
      - PRODUCT_SERVICE_PORT=15000
    deploy:
      replicas: 5
    depends_on:
      - user-service
      - product-service

volumes:
  postgres_data:
