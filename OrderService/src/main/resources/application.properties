# Default datasource (overridden by SPRING_DATASOURCE_URL env var in Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/csc301_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:csc301}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:csc301password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false

server.port=14000
server.address=0.0.0.0

# HikariCP Connection Pool Optimization
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.max-lifetime=30000

# Tomcat Web Server Optimization
server.tomcat.max-connections=4000
server.tomcat.accept-count=1000
server.tomcat.threads.max=500
server.tomcat.threads.min-spare=50


# Silence performance logging
logging.level.root=WARN
spring.main.banner-mode=off
logging.level.org.hibernate.SQL=WARN

